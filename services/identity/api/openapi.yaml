openapi: "3.1.0"
info:
  title: Mesob Identity Service
  version: "1.0.0"
servers:
  - url: http://localhost:8001
    description: Identity Service
paths:
  /identity/register:
    post:
      summary: Start registration — send OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [msisdn]
              properties:
                msisdn: {type: string, example: "+251912345678"}
                region_id: {type: string, format: uuid}
                lang: {type: string, enum: [am, om, ti, en], default: am}
      responses:
        "202":
          description: OTP sent
  /identity/login:
    post:
      summary: Authenticate with MSISDN + PIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [msisdn, pin]
              properties:
                msisdn: {type: string, example: "+251912345678"}
                pin: {type: string, example: "1234"}
      responses:
        "200":
          description: Tokens
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: {type: string}
                  refresh_token: {type: string}
                  expires_in: {type: integer}
  /identity/token/refresh:
    post:
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: {type: string}
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: {type: string}
                  expires_in: {type: integer}
                  kyc_tier: {type: integer}
  /identity/logout:
    post:
      summary: Revoke session tokens
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Logged out
  /identity/me:
    get:
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  kyc_tier: {type: integer}
                  lang: {type: string}
                  msisdn: {type: string}
  /identity/me/language:
    patch:
      summary: Update preferred language
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lang]
              properties:
                lang: {type: string, enum: [am, om, ti, en]}
      responses:
        "204":
          description: Updated
  /identity/pin/change:
    post:
      summary: Change PIN
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [old_pin, new_pin]
              properties:
                old_pin: {type: string}
                new_pin: {type: string}
      responses:
        "204":
          description: PIN changed
  /identity/kyc/upgrade:
    post:
      summary: Request KYC tier upgrade
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fan: {type: string, description: "Fayda Account Number (NID)"}
                full_name: {type: string}
                dob: {type: string, format: date}
      responses:
        "202":
          description: Submitted for review
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
