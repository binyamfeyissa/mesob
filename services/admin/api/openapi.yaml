openapi: "3.1.0"
info:
  title: Mesob Admin Service
  version: "1.0.0"
servers:
  - url: http://localhost:8009
    description: Admin Service
paths:
  /admin/dashboard/summary:
    get:
      summary: OLAP dashboard KPIs
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  float_health: {type: number}
                  loans_active: {type: integer}
                  open_alerts: {type: integer}
  /admin/dashboard/volume:
    get:
      summary: Transaction volume time-series
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: period
          schema: {type: string, enum: [7d, 30d, 90d], default: 30d}
      responses:
        "200":
          description: Volume series list
  /admin/flags:
    get:
      summary: List all feature flags
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Feature flag list
  /admin/flags/{flag}:
    patch:
      summary: Toggle feature flag
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: flag
          required: true
          schema: {type: string, example: iqub_enabled}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: {type: boolean}
                rollout_pct: {type: integer, minimum: 0, maximum: 100}
      responses:
        "200":
          description: Flag updated
  /admin/fraud/alerts:
    get:
      summary: List fraud alerts
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema: {type: string, enum: [OPEN, CLOSED, ALL], default: OPEN}
      responses:
        "200":
          description: Fraud alert list
  /admin/audit:
    get:
      summary: Paginated audit log
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: actor_id
          schema: {type: string, format: uuid}
        - in: query
          name: cursor
          schema: {type: string}
        - in: query
          name: limit
          schema: {type: integer, default: 50}
      responses:
        "200":
          description: Audit log entries
  /admin/config/{key}:
    put:
      summary: Update config (4-eyes)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: key
          required: true
          schema: {type: string, example: "kyc.limit"}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value: {type: object}
                reason: {type: string}
      responses:
        "200":
          description: Config updated
  /admin/live:
    get:
      summary: WebSocket live event stream
      description: Upgrade to `ws://localhost:8009/admin/live`. Not testable via Swagger UI.
      responses:
        "101":
          description: Switching Protocols
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
