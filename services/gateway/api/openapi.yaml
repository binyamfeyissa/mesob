openapi: "3.1.0"
info:
  title: Mesob Gateway
  version: "1.0.0"
  description: BFF gateway — routes /v1/* to domain services, validates JWT, rate-limits
servers:
  - url: http://localhost:8000
    description: Gateway
paths:
  /health:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: string, example: ok}
  /ready:
    get:
      summary: Readiness probe
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: string, example: ready}
