openapi: "3.1.0"
info:
  title: Mesob Notification Service
  version: "0.1.0"
servers:
  - url: http://localhost:8012
    description: Notification Service
paths:
  /health:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: string, example: ok}
  /ready:
    get:
      summary: Readiness probe
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: string, example: ready}
  /notify/send:
    post:
      summary: Send a notification (internal)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, template]
              properties:
                user_id: {type: string, format: uuid}
                template: {type: string, example: otp}
                params: {type: object}
                channel_hint: {type: string, enum: [SMS, PUSH, TELEGRAM]}
      responses:
        "202":
          description: Queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  delivery_id: {type: string}
                  status: {type: string}
  /notify/deliveries/{id}:
    get:
      summary: Get delivery status
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: string, format: uuid}
      responses:
        "200":
          description: Delivery record
          content:
            application/json:
              schema:
                type: object
                properties:
                  delivery_id: {type: string}
                  status: {type: string}
  /notify/templates/{key}:
    put:
      summary: Upsert template (SUPER_ADMIN)
      parameters:
        - in: path
          name: key
          required: true
          schema: {type: string, example: otp}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lang, channel, body]
              properties:
                lang: {type: string, enum: [am, om, ti, en]}
                channel: {type: string, enum: [SMS, PUSH, TELEGRAM]}
                body: {type: string}
      responses:
        "200":
          description: Updated
