openapi: "3.1.0"
info:
  title: Mesob Loans Service
  version: "1.0.0"
servers:
  - url: http://localhost:8006
    description: Loans Service
paths:
  /loans/eligibility:
    get:
      summary: Check loan eligibility
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Eligibility result
  /loans:
    get:
      summary: List user's active loans
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Loan list
  /loans/apply:
    post:
      summary: Apply for a micro-loan
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount_minor, term_days, idempotency_key]
              properties:
                amount_minor: {type: integer, format: int64}
                term_days: {type: integer, example: 30}
                idempotency_key: {type: string}
      responses:
        "201":
          description: Loan created
  /loans/{id}/repay:
    post:
      summary: Make a loan repayment
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount_minor, idempotency_key]
              properties:
                amount_minor: {type: integer, format: int64}
                idempotency_key: {type: string}
      responses:
        "200":
          description: Repayment applied
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
