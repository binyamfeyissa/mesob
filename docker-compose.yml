      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

# ── Frontend ───────────────────────────────────────────────────────────────────

  web-console:
    build:
      context: ./web/console
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_GATEWAY_URL: "http://localhost:8000"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./web/console:/app
      - console_node_modules:/app/node_modules
      - console_next_cache:/app/.next
    depends_on:
      - gateway

# ── Swagger UI — single-page full API at http://localhost:8080 ────────────────

  swagger-ui:
    image: swaggerapi/swagger-ui
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      # Disable the default petstore URL so the page loads cleanly
      SWAGGER_JSON_URL: ""
    volumes:
      # Single combined spec — all 14 services + DB schema on one page
      - ./docs/openapi-combined.yaml:/usr/share/nginx/html/specs/combined.yaml:ro
      # Per-service specs kept for reference / direct use
      - ./services/gateway/api/openapi.yaml:/usr/share/nginx/html/specs/gateway.yaml:ro
      - ./services/identity/api/openapi.yaml:/usr/share/nginx/html/specs/identity.yaml:ro
      - ./services/ledger/api/openapi.yaml:/usr/share/nginx/html/specs/ledger.yaml:ro
      - ./services/iqub/api/openapi.yaml:/usr/share/nginx/html/specs/iqub.yaml:ro
      - ./services/iddir/api/openapi.yaml:/usr/share/nginx/html/specs/iddir.yaml:ro
      - ./services/agent/api/openapi.yaml:/usr/share/nginx/html/specs/agent.yaml:ro
      - ./services/loans/api/openapi.yaml:/usr/share/nginx/html/specs/loans.yaml:ro
      - ./services/payments/api/openapi.yaml:/usr/share/nginx/html/specs/payments.yaml:ro
      - ./services/branch/api/openapi.yaml:/usr/share/nginx/html/specs/branch.yaml:ro
      - ./services/admin/api/openapi.yaml:/usr/share/nginx/html/specs/admin.yaml:ro
      - ./services/ussd/api/openapi.yaml:/usr/share/nginx/html/specs/ussd.yaml:ro
      - ./services/telegram/api/openapi.yaml:/usr/share/nginx/html/specs/telegram.yaml:ro
      - ./services/notification/api/openapi.yaml:/usr/share/nginx/html/specs/notification.yaml:ro
      - ./services/adapter-hub/api/openapi.yaml:/usr/share/nginx/html/specs/adapter-hub.yaml:ro
      # Custom initializer — loads combined.yaml as single spec (no dropdown)
      - ./docs/swagger-initializer.js:/usr/share/nginx/html/swagger-initializer.js:ro

# ── Named volumes ──────────────────────────────────────────────────────────────

volumes:
  postgres_data:
  console_node_modules:
  console_next_cache:
  go_pkg_mod:          # shared Go module download cache across all 14 Go services
