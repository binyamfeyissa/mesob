    build:
      context: ./ai
      dockerfile: scoring/Dockerfile
    ports:
      - "9001:9001"
    environment:
      MESOB_SCORING_DB_URL: "postgres://mesob:mesob@postgres:5432/mesob_scoring?sslmode=disable"
      MESOB_SCORING_REDIS_URL: "redis://redis:6379/0"
      MESOB_SCORING_KAFKA_BROKERS: "kafka:9092"
      MESOB_SCORING_PORT: "9001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  fraud:
    build:
      context: ./ai
      dockerfile: fraud/Dockerfile
    ports:
      - "9002:9002"
    environment:
      MESOB_FRAUD_DB_URL: "postgres://mesob:mesob@postgres:5432/mesob_fraud?sslmode=disable"
      MESOB_FRAUD_REDIS_URL: "redis://redis:6379/1"
      MESOB_FRAUD_KAFKA_BROKERS: "kafka:9092"
      MESOB_FRAUD_PORT: "9002"
