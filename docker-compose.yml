# ── Shared anchors ────────────────────────────────────────────────────────────

# Infra health gates (same for prod and dev)
x-infra-deps: &infra-deps
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    kafka:
      condition: service_healthy

# Dev Go service defaults — source bind-mounted, air runs live-reload
x-go-dev: &go-dev
  <<: *infra-deps
  build:
    context: .
    dockerfile: Dockerfile.go.dev
  restart: unless-stopped
  # Volumes shared by every Go service:
  #   shared/        — go-kit + events modules (read-only)
  #   go.work.dev    — workspace file (excludes seed CLI)  mapped as go.work
  #   .air.toml      — hot-reload config (mapped into the service working dir)
  #   go_pkg_mod     — module download cache (shared, speeds up first rebuild)
  # Each service also adds its own  ./services/<name>:/workspace/services/<name>
  volumes: &go-dev-shared-vols
    - ./shared:/workspace/shared:ro
    - ./go.work.dev:/workspace/go.work:ro
    - go_pkg_mod:/go/pkg/mod

# ── Infrastructure services ────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mesob
      POSTGRES_PASSWORD: mesob
      POSTGRES_DB: mesob_identity
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mesob"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:latest
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

