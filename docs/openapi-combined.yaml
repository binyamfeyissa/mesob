openapi: "3.1.0"
info:
  title: Mesob Wallet — Full API
  version: "1.0.0"
  description: |
    Complete API reference for all Mesob Wallet microservices on one page.

    Each operation's **"Try it out"** button calls the service directly at its own port.
    To call via the gateway instead, use `http://localhost:8000/v1/<service>/...`.

    | Service | Direct Port | Via Gateway prefix |
    |---------|-------------|-------------------|
    | Gateway | :8000 | — |
    | Identity | :8001 | `/v1/identity/` |
    | Ledger | :8002 | `/v1/ledger/` |
    | Iqub | :8003 | `/v1/iqub/` |
    | Iddir | :8004 | `/v1/iddir/` |
    | Agent | :8005 | `/v1/agent/` |
    | Loans | :8006 | `/v1/loans/` |
    | Payments | :8007 | `/v1/payments/` |
    | Branch | :8008 | `/v1/branch/` |
    | Admin | :8009 | `/v1/admin/` |
    | USSD | :8010 | `/v1/ussd/` |
    | Telegram | :8011 | not routed |
    | Notification | :8012 | not routed |
    | Adapter Hub | :8013 | not routed |

servers:
  - url: http://localhost:8000
    description: Gateway (default)

tags:
  - name: Health
    description: Liveness and readiness probes — select the target service from the server dropdown in each operation.
  - name: Identity
    description: |
      Authentication, registration, KYC, and user profile management.
      **Direct:** `http://localhost:8001` | **Via Gateway:** `http://localhost:8000/v1/identity/...`
  - name: Ledger
    description: |
      Internal double-entry ledger. All writes are balanced by a PostgreSQL `CONSTRAINT TRIGGER`.
      **Direct:** `http://localhost:8002` | **Via Gateway:** `http://localhost:8000/v1/ledger/...`
  - name: Payments
    description: |
      P2P transfers, merchant payments, and bill payments.
      **Direct:** `http://localhost:8007` | **Via Gateway:** `http://localhost:8000/v1/payments/...`
  - name: Loans
    description: |
      Micro-loan origination, eligibility, and repayments.
      **Direct:** `http://localhost:8006` | **Via Gateway:** `http://localhost:8000/v1/loans/...`
  - name: Iqub
    description: |
      Rotating savings circles (equb / rotating credit association).
      **Direct:** `http://localhost:8003` | **Via Gateway:** `http://localhost:8000/v1/iqub/...`
  - name: Iddir
    description: |
      Mutual insurance burial societies.
      **Direct:** `http://localhost:8004` | **Via Gateway:** `http://localhost:8000/v1/iddir/...`
  - name: Agent
    description: |
      Cash-in / cash-out agent network.
      **Direct:** `http://localhost:8005` | **Via Gateway:** `http://localhost:8000/v1/agent/...`
  - name: Branch
    description: |
      Branch officer operations — KYC queue, agent approvals, settlements, disputes, reconciliation.
      **Direct:** `http://localhost:8008` | **Via Gateway:** `http://localhost:8000/v1/branch/...`
  - name: Admin
    description: |
      Operator dashboard, feature flags, config management, fraud alerts, and audit log.
      **Direct:** `http://localhost:8009` | **Via Gateway:** `http://localhost:8000/v1/admin/...`
  - name: USSD
    description: |
      USSD session engine for feature-phone access.
      **Direct:** `http://localhost:8010` | **Via Gateway:** `http://localhost:8000/v1/ussd/...`
  - name: Telegram
    description: |
      Telegram bot webhook receiver. **Direct only:** `http://localhost:8011`
  - name: Notification
    description: |
      SMS / push notification delivery. **Direct only:** `http://localhost:8012`
  - name: Adapter Hub
    description: |
      Third-party integrations — NID verification, MFI loan origination, partner webhooks.
      **Direct only:** `http://localhost:8013`
  - name: Database Schema
    description: |
      PostgreSQL 16 table catalogue across all service databases.
      See `GET /docs/db-schema` for full column-level reference.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    MetaBlock:
      type: object
      required: [request_id]
      properties:
        request_id: {type: string}
        trace_id: {type: string}
        next_cursor: {type: string}
    ErrorBlock:
      type: object
      required: [code, message]
      properties:
        code: {type: string}
        message: {type: string}
        details:
          type: array
          items:
            type: object
            properties:
              field: {type: string}
              message: {type: string}

paths:

  # ── Health / Readiness ────────────────────────────────────────────────────────

  /health:
    servers:
      - url: http://localhost:8000
        description: Gateway :8000
      - url: http://localhost:8010
        description: USSD :8010
      - url: http://localhost:8011
        description: Telegram :8011
      - url: http://localhost:8012
        description: Notification :8012
      - url: http://localhost:8013
        description: Adapter Hub :8013
    get:
      tags: [Health]
      summary: Liveness probe
      responses:
        "200":
          description: Service alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: string, example: ok}

  /ready:
    servers:
      - url: http://localhost:8000
        description: Gateway :8000
      - url: http://localhost:8010
        description: USSD :8010
      - url: http://localhost:8011
        description: Telegram :8011
      - url: http://localhost:8012
        description: Notification :8012
      - url: http://localhost:8013
        description: Adapter Hub :8013
    get:
      tags: [Health]
      summary: Readiness probe
      responses:
        "200":
          description: Service ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: string, example: ready}

  # ── Identity ──────────────────────────────────────────────────────────────────

  /identity/register:
    servers:
      - url: http://localhost:8001
        description: Identity :8001
    post:
      tags: [Identity]
      summary: Start registration — send OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [msisdn]
              properties:
                msisdn: {type: string, example: "+251912345678"}
                region_id: {type: string, format: uuid}
                lang: {type: string, enum: [am, om, ti, en], default: am}
      responses:
        "202":
          description: OTP sent

  /identity/login:
    servers:
      - url: http://localhost:8001
        description: Identity :8001
    post:
      tags: [Identity]
      summary: Authenticate with MSISDN + PIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [msisdn, pin]
              properties:
                msisdn: {type: string, example: "+251912345678"}
                pin: {type: string, example: "1234"}
      responses:
        "200":
          description: JWT tokens
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: {type: string}
                  refresh_token: {type: string}
                  expires_in: {type: integer}

  /identity/token/refresh:
    servers:
      - url: http://localhost:8001
        description: Identity :8001
    post:
      tags: [Identity]
      summary: Refresh access token using refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: {type: string}
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: {type: string}
                  expires_in: {type: integer}
                  kyc_tier: {type: integer}

  /identity/logout:
    servers:
      - url: http://localhost:8001
        description: Identity :8001
    post:
      tags: [Identity]
      summary: Revoke session tokens
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Logged out

  /identity/me:
    servers:
      - url: http://localhost:8001
        description: Identity :8001
    get:
      tags: [Identity]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  kyc_tier: {type: integer}
                  lang: {type: string}
                  msisdn: {type: string}

  /identity/me/language:
    servers:
      - url: http://localhost:8001
        description: Identity :8001
    patch:
      tags: [Identity]
      summary: Update preferred language
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lang]
              properties:
                lang: {type: string, enum: [am, om, ti, en]}
      responses:
        "204":
          description: Language updated

  /identity/pin/change:
    servers:
      - url: http://localhost:8001
        description: Identity :8001
    post:
      tags: [Identity]
      summary: Change PIN
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [old_pin, new_pin]
              properties:
                old_pin: {type: string}
                new_pin: {type: string}
      responses:
        "204":
          description: PIN changed

  /identity/kyc/upgrade:
    servers:
      - url: http://localhost:8001
        description: Identity :8001
    post:
      tags: [Identity]
      summary: Request KYC tier upgrade
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fan: {type: string, description: "Fayda Account Number (NID)"}
                full_name: {type: string}
                dob: {type: string, format: date}
      responses:
        "202":
          description: Submitted for branch review

  # ── Ledger ────────────────────────────────────────────────────────────────────

  /ledger/accounts:
    servers:
      - url: http://localhost:8002
        description: Ledger :8002
    post:
      tags: [Ledger]
      summary: Create a ledger account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [owner_type, owner_id, type]
              properties:
                owner_type: {type: string, enum: [USER, AGENT, SYSTEM]}
                owner_id: {type: string, format: uuid}
                type: {type: string, enum: [WALLET, FLOAT, POOL, FEE]}
                currency: {type: string, default: ETB}
      responses:
        "201":
          description: Account created

  /ledger/accounts/{id}/balance:
    servers:
      - url: http://localhost:8002
        description: Ledger :8002
    get:
      tags: [Ledger]
      summary: Get current balance
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: string, format: uuid}
      responses:
        "200":
          description: Balance
          content:
            application/json:
              schema:
                type: object
                properties:
                  account_id: {type: string}
                  balance_minor: {type: integer, format: int64}
                  currency: {type: string}

  /ledger/accounts/{id}/entries:
    servers:
      - url: http://localhost:8002
        description: Ledger :8002
    get:
      tags: [Ledger]
      summary: Paginated entry history for an account
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: string, format: uuid}
        - in: query
          name: cursor
          schema: {type: string}
        - in: query
          name: limit
          schema: {type: integer, default: 50}
      responses:
        "200":
          description: Entry list

  /ledger/transactions:
    servers:
      - url: http://localhost:8002
        description: Ledger :8002
    post:
      tags: [Ledger]
      summary: Post a balanced transaction (double-entry)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, idempotency_key, entries]
              properties:
                type: {type: string}
                idempotency_key: {type: string}
                entries:
                  type: array
                  items:
                    type: object
                    required: [account_id, direction, amount_minor]
                    properties:
                      account_id: {type: string, format: uuid}
                      direction: {type: string, enum: [D, C]}
                      amount_minor: {type: integer, format: int64}
      responses:
        "201":
          description: Transaction posted

  /ledger/transactions/{id}/rev:
    servers:
      - url: http://localhost:8002
        description: Ledger :8002
    post:
      tags: [Ledger]
      summary: Reverse a posted transaction
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: {type: string}
      responses:
        "201":
          description: Reversal transaction posted

  # ── Payments ──────────────────────────────────────────────────────────────────

  /payments/merchants/{id}:
    servers:
      - url: http://localhost:8007
        description: Payments :8007
    get:
      tags: [Payments]
      summary: Get merchant details
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: string, format: uuid}
      responses:
        "200":
          description: Merchant details

  /payments/p2p:
    servers:
      - url: http://localhost:8007
        description: Payments :8007
    post:
      tags: [Payments]
      summary: Person-to-person transfer (fraud-screened, fail-closed)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to_msisdn, amount_minor, idempotency_key]
              properties:
                to_msisdn: {type: string, example: "+251987654321"}
                amount_minor: {type: integer, format: int64, example: 5000}
                note: {type: string}
                idempotency_key: {type: string}
      responses:
        "201":
          description: Transfer initiated

  /payments/merchant:
    servers:
      - url: http://localhost:8007
        description: Payments :8007
    post:
      tags: [Payments]
      summary: Pay merchant with commission split
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [merchant_id, amount_minor, idempotency_key]
              properties:
                merchant_id: {type: string, format: uuid}
                amount_minor: {type: integer, format: int64}
                idempotency_key: {type: string}
      responses:
        "201":
          description: Payment processed

  /payments/bill:
    servers:
      - url: http://localhost:8007
        description: Payments :8007
    post:
      tags: [Payments]
      summary: Pay utility bill via adapter hub
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [biller_id, reference, amount_minor, idempotency_key]
              properties:
                biller_id: {type: string, format: uuid}
                reference: {type: string}
                amount_minor: {type: integer, format: int64}
                idempotency_key: {type: string}
      responses:
        "202":
          description: Bill payment queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  biller_ref: {type: string}
                  status: {type: string}
                  transaction_id: {type: string}

  # ── Loans ─────────────────────────────────────────────────────────────────────

  /loans/eligibility:
    servers:
      - url: http://localhost:8006
        description: Loans :8006
    get:
      tags: [Loans]
      summary: Check loan eligibility for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Eligibility result

  /loans:
    servers:
      - url: http://localhost:8006
        description: Loans :8006
    get:
      tags: [Loans]
      summary: List user's active loans
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Loan list

  /loans/apply:
    servers:
      - url: http://localhost:8006
        description: Loans :8006
    post:
      tags: [Loans]
      summary: Apply for a micro-loan
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount_minor, term_days, idempotency_key]
              properties:
                amount_minor: {type: integer, format: int64}
                term_days: {type: integer, example: 30}
                idempotency_key: {type: string}
      responses:
        "201":
          description: Loan created

  /loans/{id}/repay:
    servers:
      - url: http://localhost:8006
        description: Loans :8006
    post:
      tags: [Loans]
      summary: Make a loan repayment
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount_minor, idempotency_key]
              properties:
                amount_minor: {type: integer, format: int64}
                idempotency_key: {type: string}
      responses:
        "200":
          description: Repayment applied

  # ── Iqub ──────────────────────────────────────────────────────────────────────

  /iqub/groups:
    servers:
      - url: http://localhost:8003
        description: Iqub :8003
    get:
      tags: [Iqub]
      summary: List user's Iqub groups
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Group list
    post:
      tags: [Iqub]
      summary: Create rotating savings group
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, cycle_minor, frequency, member_limit]
              properties:
                name: {type: string}
                cycle_minor: {type: integer, format: int64, description: Contribution per cycle in minor units}
                frequency: {type: string, enum: [WEEKLY, BIWEEKLY, MONTHLY]}
                member_limit: {type: integer, default: 20}
                payout_order: {type: string, enum: [RANDOM, SEQUENTIAL], default: RANDOM}
      responses:
        "201":
          description: Group created

  /iqub/groups/{id}:
    servers:
      - url: http://localhost:8003
        description: Iqub :8003
    get:
      tags: [Iqub]
      summary: Get Iqub group details
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: string, format: uuid}
      responses:
        "200":
          description: Group details

  /iqub/groups/{id}/members:
    servers:
      - url: http://localhost:8003
        description: Iqub :8003
    post:
      tags: [Iqub]
      summary: Add member to group (leader only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id: {type: string, format: uuid}
      responses:
        "201":
          description: Member added

  /iqub/groups/{id}/contribute:
    servers:
      - url: http://localhost:8003
        description: Iqub :8003
    post:
      tags: [Iqub]
      summary: Make cycle contribution
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cycle_id, idempotency_key]
              properties:
                cycle_id: {type: string, format: uuid}
                idempotency_key: {type: string}
      responses:
        "201":
          description: Contribution recorded

  /iqub/cycles/{id}/close:
    servers:
      - url: http://localhost:8003
        description: Iqub :8003
    post:
      tags: [Iqub]
      summary: Close a savings cycle and disburse payout
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: string, format: uuid}
      responses:
        "200":
          description: Cycle closed

  # ── Iddir ─────────────────────────────────────────────────────────────────────

  /iddir/groups:
    servers:
      - url: http://localhost:8004
        description: Iddir :8004
    post:
      tags: [Iddir]
      summary: Create mutual insurance group
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, premium_minor, frequency, benefit_minor]
              properties:
                name: {type: string}
                premium_minor: {type: integer, format: int64}
                frequency: {type: string, enum: [MONTHLY, QUARTERLY]}
                benefit_minor: {type: integer, format: int64}
      responses:
        "201":
          description: Group created

  /iddir/groups/{id}/premium:
    servers:
      - url: http://localhost:8004
        description: Iddir :8004
    post:
      tags: [Iddir]
      summary: Pay mutual insurance premium
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [period, idempotency_key]
              properties:
                period: {type: string, example: "2026-06", description: "YYYY-MM"}
                idempotency_key: {type: string}
      responses:
        "201":
          description: Premium recorded

  /iddir/groups/{id}/claims:
    servers:
      - url: http://localhost:8004
        description: Iddir :8004
    post:
      tags: [Iddir]
      summary: File an insurance claim
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, description]
              properties:
                type: {type: string, enum: [DEATH, DISABILITY, HOSPITALIZATION]}
                description: {type: string}
                evidence_ref: {type: string}
      responses:
        "201":
          description: Claim submitted

  /iddir/groups/{id}/claims/{cid}:
    servers:
      - url: http://localhost:8004
        description: Iddir :8004
    get:
      tags: [Iddir]
      summary: Get claim status
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: string, format: uuid}
        - in: path
          name: cid
          required: true
          schema: {type: string, format: uuid}
      responses:
        "200":
          description: Claim details

  # ── Agent ─────────────────────────────────────────────────────────────────────

  /agent/float:
    servers:
      - url: http://localhost:8005
        description: Agent :8005
    get:
      tags: [Agent]
      summary: Get agent float balance
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Float balance

  /agent/onboard:
    servers:
      - url: http://localhost:8005
        description: Agent :8005
    post:
      tags: [Agent]
      summary: Submit agent onboarding request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [region_id, fan]
              properties:
                region_id: {type: string, format: uuid}
                fan: {type: string, description: Fayda Account Number}
                business_name: {type: string}
      responses:
        "202":
          description: Onboarding submitted for branch review

  /agent/cash-in:
    servers:
      - url: http://localhost:8005
        description: Agent :8005
    post:
      tags: [Agent]
      summary: Agent disburses cash to customer wallet
      security:
