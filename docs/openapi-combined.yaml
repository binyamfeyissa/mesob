  # ── Database Schema ───────────────────────────────────────────────────────────

  /docs/db-schema:
    get:
      tags: [Database Schema]
      summary: PostgreSQL table catalogue — documentation only, not a real endpoint
      description: |
        **This operation is documentation-only.** No service exposes this path.

        PostgreSQL 16 runs on `localhost:5433` (Docker maps container `5432 → host 5433`).
        Monetary amounts are stored as `BIGINT` in **minor units** — 1 ETB = 100 minor units.
        Every service database has an `outbox_events` table for transactional outbox → Kafka.

        ---

        ## mesob_identity

        | Table | PK | Key Columns |
        |-------|-----|-------------|
        | `regions` | `id UUID` | `name VARCHAR(128)`, `code VARCHAR(8)` UNIQUE |
        | `users` | `id UUID` | `msisdn VARCHAR(20)`, `fan_hash BYTEA` UNIQUE, `kyc_tier SMALLINT` (0/1/2), `status` (PENDING/ACTIVE), `preferred_lang`, `deleted_at` |
        | `credentials` | `user_id UUID → users` | `pin_hash BYTEA`, `failed_count SMALLINT`, `locked_until TIMESTAMPTZ` |
        | `kyc_limits` | `tier SMALLINT` | `per_txn_minor BIGINT`, `daily_minor BIGINT`, `balance_minor BIGINT` — tier 0: 5/2/5 ETB hundreds, tier 2: 50k/200k/500k ETB |
        | `kyc_limits_history` | `id UUID` | Audit trail for limit changes (`changed_by`, `change_reason`) |
        | `outbox_events` | `id UUID` | `aggregate`, `event_type`, `payload_json JSONB`, `published BOOLEAN` |

        ---

        ## mesob_ledger

        | Table | PK | Key Columns |
        |-------|-----|-------------|
        | `accounts` | `id UUID` | `owner_type VARCHAR(16)`, `owner_id UUID`, `type` (WALLET/FLOAT/POOL/FEE), `currency CHAR(3)`, `allow_negative BOOLEAN` |
        | `account_balances` | `account_id UUID → accounts` | `balance_minor BIGINT` — materialised, updated by trigger |
        | `transactions` | `(id, created_at)` partitioned monthly | `type VARCHAR(24)`, `idempotency_key VARCHAR(64)` UNIQUE/month, `reverses_txn_id UUID` |
        | `ledger_entries` | `(id, created_at)` partitioned monthly | `direction CHAR(1)` D/C, `amount_minor BIGINT CHECK > 0` — **balanced by `CONSTRAINT TRIGGER trg_assert_balanced`** |
        | `idempotency_keys` | `key VARCHAR(64)` | `transaction_id UUID`, `expires_at TIMESTAMPTZ` (24 h TTL) |
        | `outbox_events` | `id UUID` | — |

        ---

        ## mesob_iqub

        | Table | PK | Key Columns |
        |-------|-----|-------------|
        | `iqub_groups` | `id UUID` | `cycle_minor BIGINT`, `frequency`, `member_limit SMALLINT`, `payout_order` (RANDOM/SEQUENTIAL), `status` (FORMING/ACTIVE/CLOSED), `join_code VARCHAR(16)` |
        | `iqub_memberships` | `id UUID` | `group_id`, `user_id`, `payout_order SMALLINT`, `cycle_state` — UNIQUE(`group_id, user_id`) |
        | `iqub_cycles` | `id UUID` | `group_id`, `number SMALLINT`, `status` (OPEN/CLOSED), `recipient_id UUID`, `due_date DATE` |
        | `outbox_events` | `id UUID` | — |

        ---

        ## mesob_iddir

        | Table | PK | Key Columns |
        |-------|-----|-------------|
        | `iddir_groups` | `id UUID` | `premium_minor BIGINT`, `benefit_minor BIGINT`, `frequency`, `pool_account_id UUID` |
        | `iddir_memberships` | `id UUID` | `group_id`, `user_id`, `coverage_status` — UNIQUE(`group_id, user_id`) |
        | `iddir_premiums` | `id UUID` | `membership_id`, `period VARCHAR(8)` (YYYY-MM), `transaction_id UUID` |
        | `iddir_claims` | `id UUID` | `type` (DEATH/DISABILITY/HOSPITALIZATION), `status` (UNDER_REVIEW/APPROVED/REJECTED), `settled_minor BIGINT`, `evidence_ref` |
        | `outbox_events` | `id UUID` | — |

        ---

        ## mesob_agent

        | Table | PK | Key Columns |
        |-------|-----|-------------|
        | `agents` | `id UUID` | `user_id UUID` UNIQUE, `float_account_id UUID`, `float_limit_minor BIGINT`, `region_id UUID`, `status` (PENDING/ACTIVE/SUSPENDED) |
        | `settlements` | `id UUID` | `agent_id`, `amount_minor`, `authorised_by UUID`, `second_authoriser UUID` (4-eyes), `confirmed_at` |
        | `outbox_events` | `id UUID` | — |

        ---

        ## mesob_loans

        | Table | PK | Key Columns |
        |-------|-----|-------------|
        | `credit_scores` | `id UUID` | `user_id`, `score SMALLINT`, `tier CHAR(1)`, `ceiling_minor BIGINT`, `model_ver VARCHAR(64)`, `shap_json JSONB`, `inputs_hash BYTEA` |
        | `loans` | `id UUID` | `principal_minor BIGINT`, `outstanding_minor BIGINT`, `status` (ACTIVE/REPAID/DEFAULTED), `mode` (INTERNAL/MFI), `due_date DATE`, `mfi_facility_id VARCHAR(128)` |
        | `repayments` | `id UUID` | `loan_id`, `amount_minor`, `transaction_id UUID` |
        | `decisions` | `id UUID` | `decision` (APPROVE/REJECT), `reasons JSONB`, `ceiling_minor BIGINT` |
        | `outbox_events` | `id UUID` | — |

        ---

        ## mesob_payments

        | Table | PK | Key Columns |
        |-------|-----|-------------|
        | `merchants` | `id UUID` | `name VARCHAR(128)`, `account_id UUID`, `commission_pct NUMERIC(5,2)`, `status` |
        | `billers` | `id UUID` | `name`, `adapter_key VARCHAR(64)` UNIQUE, `status` |
        | `payment_refs` | `id UUID` | `type` (P2P/MERCHANT/BILL), `transaction_id UUID`, `biller_ref VARCHAR(128)`, `status` |
        | `outbox_events` | `id UUID` | — |

        ---

        ## mesob_branch

        | Table | PK | Key Columns |
        |-------|-----|-------------|
        | `branches` | `id UUID` | `name`, `region_id UUID`, `officer_id UUID` |
        | `approvals` | `id UUID` | `agent_id UUID`, `branch_id UUID`, `float_ceiling_minor BIGINT`, `approved_by UUID` |
        | `disputes` | `id UUID` | `transaction_id UUID`, `raised_by UUID`, `resolution` (REVERSE/UPHOLD), `reversal_txn_id UUID`, `second_authoriser UUID` |
        | `outbox_events` | `id UUID` | — |

        ---

        ## mesob_admin

        | Table | PK | Key Columns |
        |-------|-----|-------------|
        | `feature_flags` | `id UUID` | `name VARCHAR(64)` UNIQUE, `enabled BOOLEAN`, `rollout_pct SMALLINT` (0–100), `updated_by UUID` |
        | `config_items` | `key VARCHAR(128)` | `value JSONB`, `version INT`, `updated_by UUID` |
        | `config_history` | `id UUID` | Audit trail for config changes (`valid_from`, `valid_to`, `changed_by`, `reason`) |
        | `audit_log` | `(id, created_at)` partitioned monthly | `actor_id UUID`, `actor_role VARCHAR(32)`, `action VARCHAR(64)`, `target VARCHAR(128)`, `ip INET` |

        ---

        ## mesob_notification

        | Table | PK | Key Columns |
        |-------|-----|-------------|
        | `templates` | `id UUID` | `key`, `lang`, `channel` — UNIQUE(`key, lang, channel`). Pre-seeded: OTP + txn templates in 4 languages (am/en/om/ti). |
        | `delivery_log` | `id UUID` | `user_id UUID`, `template_key`, `channel`, `status` (QUEUED/DELIVERED/FAILED), `attempts SMALLINT`, `last_error TEXT` |

        ---

        ## mesob_scoring  *(Python AI service — :9001)*

        | Table | PK | Key Columns |
        |-------|-----|-------------|
        | `credit_scores` | `id UUID` | `user_id`, `score SMALLINT`, `tier CHAR(1)`, `ceiling_minor BIGINT`, `model_ver VARCHAR(64)`, `shap_json JSONB`, `inputs_hash BYTEA` |

        ---

        ## mesob_fraud  *(Python AI service — :9002)*

        | Table | PK | Key Columns |
        |-------|-----|-------------|
        | `fraud_alerts` | `id UUID` | `user_id UUID`, `transaction_id UUID`, `rule VARCHAR(64)`, `severity` (HIGH/MEDIUM/LOW), `risk_score NUMERIC(5,2)`, `status` (OPEN/CLOSED), `disposition`, `disposed_by UUID` |

        ---

        ## mesob_adapters

