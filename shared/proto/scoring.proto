syntax = "proto3";
package scoring;
option go_package = "github.com/mesob-wallet/scoring/internal/transport/grpc/pb;pb";

service ScoringService {
  rpc Score(ScoreRequest) returns (ScoreResponse);
}

message ScoreRequest {
  string user_id         = 1;
  bool   force_recompute = 2;
}

message Factor {
  string feature      = 1;
  float  contribution = 2;
}

message ScoreResponse {
  string   score_id      = 1;
  int32    score         = 2;
  string   tier          = 3;
  int64    ceiling_minor = 4;
  string   model_ver     = 5;
  string   source        = 6; // ML | RULES
  repeated Factor factors = 7;
}
