syntax = "proto3";
package notify;
option go_package = "github.com/mesob-wallet/notification/internal/transport/grpc/pb;pb";

service NotificationService {
  rpc Send(SendRequest) returns (SendResponse);
}

message SendRequest {
  string user_id      = 1;
  string template     = 2;
  string channel_hint = 3;
  map<string, string> params = 4;
}

message SendResponse {
  string delivery_id = 1;
  string status      = 2;
}
